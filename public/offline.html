<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Sullivan County, Tennessee</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0c1e33" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        background: #faf8f5;
        color: #2d3038;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .seal {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
        opacity: 0.85;
      }
      h1 {
        font-family: 'Libre Caslon Text', Georgia, serif;
        font-size: clamp(1.5rem, 5vw, 2.25rem);
        color: #0c1e33;
        margin: 0 0 0.75rem;
      }
      p {
        max-width: 32rem;
        font-size: 1rem;
        line-height: 1.6;
        color: #4a4d56;
        margin: 0 0 1.5rem;
      }
      .emergency {
        margin-top: 2rem;
        padding: 1.25rem 1.5rem;
        background: #0c1e33;
        color: #faf8f5;
        border-radius: 2px;
        max-width: 28rem;
      }
      .emergency h2 {
        font-family: 'Libre Caslon Text', Georgia, serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #c9a84c;
        margin: 0 0 0.5rem;
      }
      .emergency a {
        color: #faf8f5;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.125rem;
        display: block;
        margin-top: 0.25rem;
      }
      .emergency a:hover { color: #c9a84c; }
      .reload {
        margin-top: 1.5rem;
        padding: 0.75rem 1.5rem;
        background: #a44d2a;
        color: white;
        border: none;
        border-radius: 2px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .reload:hover { background: #c9582f; }
    </style>
  </head>
  <body>
    <img src="/images/seal/sullivan-seal.svg" alt="Sullivan County, Tennessee seal" class="seal" />
    <h1>You're offline</h1>
    <p>
      The page you requested isn't available offline yet, but you can still use the cached
      emergency pages. Reconnect to the internet for the full site.
    </p>
    <button class="reload" type="button" onclick="window.location.reload()">Try again</button>

    <div class="emergency">
      <h2>In an emergency</h2>
      <a href="tel:911">Call 911</a>
      <a href="tel:+14232797500">Sheriff (non-emergency) · (423) 279-7500</a>
      <a href="tel:+14233236912">Emergency Management · (423) 323-6912</a>
    </div>
  </body>
</html>
