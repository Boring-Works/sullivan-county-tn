name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Preview deploy disabled until isolated preview bindings exist
        run: |
          echo "Preview deploy intentionally disabled."
          echo "This app has mutation-capable D1/KV bindings; preview deploys must not share production data."

      - name: Skip preview when Cloudflare token is not configured
        if: ${{ false }}
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare preview deploy."
          echo "Set the repository secret to enable GitHub Actions preview deploys."

      - name: Deploy preview
        if: ${{ false }}
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy --env preview

      - name: Comment preview URL
        if: ${{ false }}
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Preview deployed: https://sullivan-county-tn-preview.codyboring.workers.dev'
            })

  production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Skip deploy when Cloudflare token is not configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare deploy."
          echo "Set the repository secret to enable GitHub Actions deploys."

      - name: Deploy to production
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
