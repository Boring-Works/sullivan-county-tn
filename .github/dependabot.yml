version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    groups:
      patch-updates:
        applies-to: version-updates
        update-types: ["patch"]
      minor-updates:
        applies-to: version-updates
        update-types: ["minor"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      tanstack:
        patterns: ["@tanstack/*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns: ["*"]
